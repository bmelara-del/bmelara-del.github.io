<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact Sebastian Ala Torre." />
    <title>Contact | Sebastian Ala Torre</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <canvas id="grid-canvas" aria-hidden="true"></canvas>

      <nav class="site-nav" aria-label="Main navigation">
        <a class="site-nav__brand" href="index.html">Sebastian Ala Torre</a>

        <div class="site-nav__links">
          <a class="site-nav__link" href="index.html">Home</a>
          <a class="site-nav__link" href="projects.html">Projects</a>
          <a class="site-nav__link" href="experience.html">Experience</a>
          <a class="site-nav__link" href="skills.html">Skills</a>
          <a class="site-nav__link" href="resume.html">Resume</a>
          <a class="site-nav__link site-nav__link--active" href="contact.html">Contact</a>
        </div>
      </nav>

      <div class="page-header__content">
        <p class="page-header__eyebrow">Portfolio</p>
        <h1 class="page-header__title">Contact</h1>
        <p class="page-header__subtitle">
          Reach out through email, LinkedIn, or GitHub.
        </p>
      </div>
    </header>

    <main class="content-shell">
      <section class="contact-section" aria-labelledby="contact-heading">
        <h2 id="contact-heading" class="section-title">contact</h2>

        <div class="contact-card">
          <p class="section-copy">
            I’m always open to connecting about software engineering, web
            development, collaboration, and new opportunities.
          </p>

          <div class="social-links" id="social-links"></div>

          <form id="contact-form" class="contact-form" novalidate>
            <div class="form-row">
              <label class="form-field">
                <span>Name</span>
                <input id="contact-name" name="name" type="text" />
                <small class="form-error" id="name-error"></small>
              </label>

              <label class="form-field">
                <span>Email</span>
                <input id="contact-email" name="email" type="email" />
                <small class="form-error" id="email-error"></small>
              </label>
            </div>

            <label class="form-field">
              <span>Subject</span>
              <input id="contact-subject" name="subject" type="text" />
              <small class="form-error" id="subject-error"></small>
            </label>

            <label class="form-field">
              <span>Message</span>
              <textarea
                id="contact-message"
                name="message"
                rows="6"
                maxlength="300"
              ></textarea>
              <div class="form-meta">
                <small class="form-error" id="message-error"></small>
                <small id="message-count" class="character-count">0 / 300</small>
              </div>
            </label>

            <button class="button-link form-submit" type="submit">Send Message</button>
            <p id="form-status" class="form-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
